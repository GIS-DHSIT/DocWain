<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DocWain AI</title>
    <script src="https://unpkg.com/htmx.org@1.8.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">

    <div class="bg-white p-6 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold text-center">🔐 Login</h2>

        <form hx-post="/api/auth/login" hx-target="#login-message" class="mt-4">
            <input type="text" name="username" placeholder="📧 Email" class="w-full p-2 border rounded mb-2">
            <input type="password" name="password" placeholder="🔑 Password" class="w-full p-2 border rounded mb-4">
            <button class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Login</button>
        </form>

        <div id="login-message" class="text-center text-red-500 mt-2"></div>
        <p class="text-center mt-4">Don't have an account? <a href="/signup" class="text-blue-500">Sign up</a></p>
    </div>

</body>
</html>
