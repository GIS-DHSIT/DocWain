<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - DocWain AI</title>
    <script src="https://unpkg.com/htmx.org@1.8.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold text-center">📝 Create an Account</h2>

        <form hx-post="/api/auth/signup" hx-target="#signup-message" class="mt-4">
            <input type="text" name="username" placeholder="👤 Username" class="w-full p-2 border rounded mb-2">
            <input type="email" name="email" placeholder="📧 Email" class="w-full p-2 border rounded mb-2">
            <input type="password" name="password" placeholder="🔑 Password" class="w-full p-2 border rounded mb-2">
            <button class="w-full bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">Sign Up</button>
        </form>

        <div id="signup-message" class="text-center mt-2"></div>
        <p class="text-center mt-4">Already have an account? <a href="/login" class="text-blue-500">Login</a></p>
    </div>
</body>
</html>
