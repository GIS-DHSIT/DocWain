services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - internal

  docwain:
    build: .
    depends_on:
      - redis
    ports:
      - "8000:8000"         
    env_file: .env
    environment:
      OLLAMA_HOST: "http://host.docker.internal:11434"
    networks:
      - internal
      - public
    restart: unless-stopped

networks:
  internal:
    internal: true
  public:

volumes:
  redis-data:

