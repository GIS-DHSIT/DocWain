version: '3.8'

services:
  docwain:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - docs-data:/app/docs-db
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - APP_HOME=/app/docwain
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT_COLLECTION_SIZE=768

volumes:
  docs-data:
  qdrant-data: