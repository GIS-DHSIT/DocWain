name: Deploy DocWainKB Course Site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/course/**'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_SMOKE_0740F4F03 }}
          action: "upload"
          app_location: "docs/course"
          api_location: ""
          output_location: ""
          skip_app_build: true
